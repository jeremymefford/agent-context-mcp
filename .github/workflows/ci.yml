name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
