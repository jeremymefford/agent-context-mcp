name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-darwin-arm64-release:
    runs-on: macos-14
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Darwin arm64 binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package Darwin arm64 release
        run: |
          mkdir -p release-artifacts
          cp target/aarch64-apple-darwin/release/agent-context release-artifacts/agent-context
          tar -C release-artifacts -czf release-artifacts/agent-context-darwin-arm64.tar.gz agent-context
          shasum -a 256 release-artifacts/agent-context-darwin-arm64.tar.gz > release-artifacts/agent-context-darwin-arm64.tar.gz.sha256

      - name: Generate Homebrew formula
        run: |
          mkdir -p release-artifacts/homebrew
          VERSION=${{ steps.version.outputs.version }}
          ARM_SHA=$(cut -d ' ' -f1 release-artifacts/agent-context-darwin-arm64.tar.gz.sha256)
          node scripts/update-homebrew-formula.mjs \
            --version "$VERSION" \
            --arm-url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/agent-context-darwin-arm64.tar.gz" \
            --arm-sha "$ARM_SHA" \
            --output release-artifacts/homebrew/agent-context.rb

      - name: Create tag
        if: ${{ github.ref_type != 'tag' }}
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Local tag v${VERSION} already exists."
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
          fi
          git push origin "refs/tags/v${VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-artifacts/agent-context-darwin-arm64.tar.gz
            release-artifacts/agent-context-darwin-arm64.tar.gz.sha256
            release-artifacts/homebrew/agent-context.rb

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi

          git clone "https://$TAP_TOKEN@github.com/jeremymefford/homebrew-agent-context-mcp.git" tap
          mkdir -p tap/Formula
          cp release-artifacts/homebrew/agent-context.rb tap/Formula/agent-context.rb
          cd tap
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          if git rev-parse --verify refs/heads/main >/dev/null 2>&1; then
            git switch main
          else
            git switch -c main
          fi

          git add Formula/agent-context.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "agent-context ${VERSION}"
            git push origin HEAD:main
          fi
