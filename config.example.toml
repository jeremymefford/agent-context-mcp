snapshot_path = "~/Library/Application Support/agent-context/state/snapshot.json"
index_root = "~/Library/Application Support/agent-context/index-v1"
default_group = "workspace"

[embedding]
default_profile = "hosted"

[embedding.profiles.hosted]
provider = "voyage"
model = "voyage-code-3"

[embedding.profiles.hosted.voyage]
api_key_env = "VOYAGE_API_KEY"
# key_file = "~/Library/Application Support/agent-context/voyage_key"

[embedding.profiles.local]
provider = "openai"
model = "text-embedding-nomic-embed-text-v1.5"

[embedding.profiles.local.openai]
api_key_env = "OPENAI_API_KEY"
# key_file = "~/Library/Application Support/agent-context/openai_key"
base_url = "https://api.openai.com/v1"
# For LM Studio, set:
# api_key_env = "LM_STUDIO_API_KEY"
# base_url = "http://127.0.0.1:1234/v1"

[embedding.profiles.ollama]
provider = "ollama"
model = "embeddinggemma"

[embedding.profiles.ollama.ollama]
base_url = "http://127.0.0.1:11434"

# Assign specific repos to non-default profiles.
# [[embedding.assignments]]
# repo = "/absolute/path/to/repo"
# profile = "local"

[worktrees]
# ignore = do not auto-resolve Git worktrees unless explicitly configured as repos
# overlay = reuse the canonical repo index and index only changed/new worktree files
# full = treat configured worktree paths as separate full repos
mode = "overlay"
auto_discover = true
max_overlay_files = 500
max_overlay_bytes = "25MB"
# "inherit" uses the canonical repo embedding profile. Set a profile name such as
# "ollama" to force cheaper local embeddings for worktree overlays.
embedding_profile = "inherit"

[milvus]
address = "127.0.0.1:19530"
# token_env = "MILVUS_TOKEN"

[freshness]
# audit_interval_secs = 900

[search]
max_concurrent_requests = 2
max_concurrent_repo_searches = 4
max_concurrent_lexical_tasks = 2
max_concurrent_dense_tasks = 2
max_warm_repos = 4

[[groups]]
id = "workspace"
label = "Workspace"
repos = [
  "/absolute/path/to/repo",
]
